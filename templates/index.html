<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Curiosity Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0d1117; /* GitHub Dark Mode style background */
            color: #c9d1d9; 
            font-family: 'Fredoka', sans-serif; 
        }
        .container { max-width: 800px; margin-top: 3rem; }
        
        /* Typography */
        h1 { color: #58a6ff; font-weight: 600; font-size: 2.5rem;}
        h4 { color: #a5d6ff; }
        .tagline { color: #ffffff; font-size: 1.2rem; margin-bottom: 2rem; }
        
        /* Cards & Containers */
        .card { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 16px; 
            padding: 2rem; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
            margin-bottom: 2rem;
        }
        
        /* Inputs & Textareas */
        .form-control { 
            background-color: #010409; 
            color: #58a6ff; 
            border: 1px solid #30363d; 
            border-radius: 12px; 
            font-family: 'JetBrains Mono', monospace; /* Code font */
            padding: 15px;
            font-size: 1.1rem;
        }
        .form-control:focus { 
            background-color: #010409; 
            color: #58a6ff; 
            border-color: #58a6ff; 
            box-shadow: 0 0 0 0.25rem rgba(88, 166, 255, 0.25); 
        }
        .form-control::placeholder { color: #484f58; }

        /* Buttons */
        .btn-magic { 
            background: linear-gradient(90deg, #986ee2, #8b48fa); 
            color: white; 
            border: none; 
            font-size: 1.2rem; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: 600; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        .btn-magic:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 12px rgba(152, 110, 226, 0.4);
            color: white; 
        }
        .btn-test { 
            background-color: #238636; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            padding: 15px; 
            font-size: 1.1rem;
            width: 100%;
            margin-top: 15px;
            transition: background-color 0.2s;
        }
        .btn-test:hover { background-color: #2ea043; color: white;}

        /* Quiz Elements */
        .cs-concept { 
            font-family: 'JetBrains Mono', monospace; 
            background: #21262d; 
            padding: 20px; 
            border-radius: 12px; 
            border-left: 4px solid #986ee2; 
            line-height: 1.8;
            font-size: 1.05rem;
            color: #e6edf3;
        }
        .quiz-option { 
            background-color: #21262d; 
            border: 2px solid #30363d; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            font-family: 'JetBrains Mono', monospace; 
            transition: all 0.2s; 
            color: #c9d1d9;
        }
        .quiz-option:hover { border-color: #58a6ff; background-color: #1c2128; }
        .correct { background-color: #1f3a28 !important; border-color: #238636 !important; color: #56d364; font-weight: bold;}
        .wrong { background-color: #3d1c20 !important; border-color: #da3633 !important; color: #ff7b72; text-decoration: line-through;}
        
        #loading { display: none; text-align: center; margin: 20px 0; }
        #explanationArea, #quizArea { display: none; }
        
        /* Fun Emoji Badges */
        .emoji-badge { font-size: 1.5rem; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="text-center">
            <h1>🚀 CS Curiosity Engine</h1>
            <p class="tagline">Feed your brain. Decode the mystery. Level up your coding skills.</p>
        </div>

        <div class="card">
            <label for="doubtInput" class="form-label fw-bold mb-3" style="font-size: 1.2rem; color: #e6edf3;">What computer science mystery do you want to unlock today?</label>
            <textarea class="form-control mb-4" id="doubtInput" rows="3" placeholder="e.g., What is a Python Loop? How do Hackers type so fast? What is an Algorithm?"></textarea>
            <button class="btn btn-magic w-100" onclick="solveDoubt()">✨ Decode the Mystery</button>
        </div>

        <div id="loading">
            <div class="spinner-border" style="color: #986ee2;" role="status"></div>
            <p class="mt-3" style="color: #8b949e; font-family: 'JetBrains Mono', monospace;">Compiling knowledge... please wait...</p>
        </div>

        <div id="explanationArea">
            <div class="card border-0">
                <h4 class="mb-4"><span class="emoji-badge">🧠</span> Knowledge Unlocked</h4>
                <div id="explanation" class="cs-concept"></div>
                
                <button id="startQuizBtn" class="btn btn-test" onclick="renderQuiz()">🎮 I'm ready. Start the Boss Fight (Quiz)!</button>
            </div>
        </div>

        <div id="quizArea">
            <div class="card border-0">
                <h4 class="mb-4 text-center"><span class="emoji-badge">🏆</span> Level Up: Knowledge Check</h4>
                <div id="quizContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let currentQuizData = null; 

        async function solveDoubt() {
            const doubt = document.getElementById('doubtInput').value;
            if (!doubt) {
                alert("Please type a question first!");
                return;
            }

            // Reset UI states
            document.getElementById('loading').style.display = 'block';
            document.getElementById('explanationArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'none';
            document.getElementById('startQuizBtn').style.display = 'block';

            try {
                const response = await fetch('/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doubt: doubt })
                });
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                // Show the Explanation
                document.getElementById('explanation').innerText = data.explanation;
                document.getElementById('explanationArea').style.display = 'block';
                
                // Save the quiz data 
                currentQuizData = data.quiz;

            } catch (error) {
                alert('Connection error. Is the server running?');
                console.error(error);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderQuiz() {
            if (!currentQuizData) return;

            const quizContainer = document.getElementById('quizContainer');
            quizContainer.innerHTML = ''; 
            
            currentQuizData.forEach((q, index) => {
                let html = `<div class="mb-5"><h5 class="mb-3" style="color: #a5d6ff;">Mission ${index + 1}: ${q.question}</h5>`;
                q.options.forEach(opt => {
                    html += `<div class="quiz-option" onclick="checkAnswer(this, \`${opt}\`, \`${q.answer}\`)"> > ${opt}</div>`;
                });
                html += `</div>`;
                quizContainer.innerHTML += html;
            });
            
            document.getElementById('startQuizBtn').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            document.getElementById('quizArea').scrollIntoView({ behavior: 'smooth' });
        }

        function checkAnswer(element, selected, correct) {
            const siblings = element.parentElement.querySelectorAll('.quiz-option');
            if (element.parentElement.querySelector('.correct') || element.parentElement.querySelector('.wrong')) return;
            
            if (selected === correct) {
                element.classList.add('correct');
                element.innerHTML = '✅ ' + element.innerHTML;
            } else {
                element.classList.add('wrong');
                element.innerHTML = '❌ ' + element.innerHTML;
                siblings.forEach(sibling => {
                    if (sibling.innerText.includes(correct)) {
                        sibling.classList.add('correct');
                    }
                });
            }
        }
    </script>
</body>
</html>
